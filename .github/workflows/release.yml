name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-asset:
    name: Attach ha-gate-card.js to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Upload card asset
        run: gh release upload "$TAG" dist/ha-gate-card.js --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
